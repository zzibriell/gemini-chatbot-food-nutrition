  <link rel="stylesheet" href="style.css"/>

<body>
  <header>

  <div class="container">
    <div class="hero-caption">
      <div class="mini-caption">Ahli Gizi Cerdas</div>
      <h1>Nutribot AI</h1>
      <p class="sub-instruction">Konsultasikan keperluan gizi anda dan keluarga dengan kami</p>
